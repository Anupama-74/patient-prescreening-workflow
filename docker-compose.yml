services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: srotas
      POSTGRES_USER: srotas
      POSTGRES_PASSWORD: srotas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srotas -d srotas"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgres://srotas:srotas@postgres:5432/srotas
      PORT: 3000
      PROVIDER_MODE: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
